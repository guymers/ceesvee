name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-24.04
    name: Test
    strategy:
      matrix:
        scala: [ 2.13.x, 3.x ]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: zulu
          java-version: '21'
          java-package: jdk

      - name: Install SBT
        uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0

      - name: Cache SBT
        uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v8.1.1
        with:
          extraKey: v2

      - name: Lint
        run: sbt --client "++${{ matrix.scala }} scalafmtCheckAll"

      - name: Compile
        run: sbt --client "++${{ matrix.scala }} Test/compile"

      - name: Test
        run: sbt --client "++${{ matrix.scala }} test"
